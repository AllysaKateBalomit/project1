<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>My Account || Real Estate Broker</title>
	<link rel="stylesheet" href="../css/styles.css">
	<style>
		.account-container {
			display: grid;
			grid-template-columns: 1fr;
			max-width: 500px;
			margin: 40px auto;
			padding: 30px;
			background: var(--accent);
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0,0,0,.15);
		}

		.account-container h2 {
			color: var(--text);
			text-align: center;
			margin: 0 0 30px 0;
			font-size: 28px;
		}

		.user-avatar {
			display: flex;
			justify-content: center;
			margin-bottom: 25px;
		}

		.avatar-circle {
			width: 80px;
			height: 80px;
			border-radius: 50%;
			background: var(--green);
			color: white;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 36px;
			font-weight: 700;
		}

		.user-info {
			display: flex;
			flex-direction: column;
			gap: 20px;
			margin-bottom: 30px;
		}

		.info-item {
			border-bottom: 1px solid #eee;
			padding-bottom: 15px;
		}

		.info-label {
			font-size: 12px;
			font-weight: 700;
			color: #666;
			text-transform: uppercase;
			margin-bottom: 5px;
		}

		.info-value {
			font-size: 16px;
			color: var(--text);
		}

		.action-buttons {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
			margin-bottom: 15px;
		}

		.btn {
			padding: 12px 18px;
			border-radius: 4px;
			border: none;
			font-weight: 700;
			cursor: pointer;
			font-size: 14px;
			transition: all 0.3s;
			text-align: center;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		.btn-primary {
			background: var(--green);
			color: white;
		}

		.btn-primary:hover {
			background: #4a6d45;
		}

		.btn-logout {
			background: #dc3545;
			color: white;
			grid-column: 1 / -1;
		}

		.btn-logout:hover {
			background: #c82333;
		}

		.btn-back {
			background: #6c757d;
			color: white;
			grid-column: 1 / -1;
		}

		.btn-back:hover {
			background: #5a6268;
		}

		.account-settings {
			background: #f9f9f9;
			padding: 15px;
			border-radius: 4px;
			margin-bottom: 20px;
		}

		.account-settings h3 {
			margin: 0 0 12px 0;
			font-size: 16px;
			color: var(--text);
		}

		.settings-option {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 10px 0;
			border-bottom: 1px solid #eee;
		}

		.settings-option:last-child {
			border-bottom: none;
		}

		.settings-option label {
			font-size: 14px;
			color: var(--text);
		}

		.toggle-switch {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.toggle-switch input[type="checkbox"] {
			width: 40px;
			height: 22px;
			cursor: pointer;
			appearance: none;
			background: #ccc;
			border-radius: 11px;
			position: relative;
			transition: background 0.3s;
		}

		.toggle-switch input[type="checkbox"]:checked {
			background: var(--green);
		}

		.not-logged-in {
			text-align: center;
			padding: 40px 20px;
			color: #666;
		}

		.not-logged-in p {
			margin-bottom: 20px;
			font-size: 16px;
		}

		.login-register-links {
			display: flex;
			gap: 12px;
			justify-content: center;
		}

		.login-register-links a {
			padding: 10px 20px;
			border-radius: 4px;
			text-decoration: none;
			font-weight: 700;
			font-size: 14px;
			transition: all 0.3s;
		}

		.login-register-links a:first-child {
			background: var(--green);
			color: white;
		}

		.login-register-links a:first-child:hover {
			background: #4a6d45;
		}

		.login-register-links a:last-child {
			background: #6c757d;
			color: white;
		}

		.login-register-links a:last-child:hover {
			background: #5a6268;
		}

		@media (max-width: 600px) {
			.account-container {
				max-width: 100%;
				margin: 20px;
				padding: 20px;
			}

			.account-container h2 {
				font-size: 22px;
			}

			.action-buttons {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<header class="site-header">
		<nav class="nav">
			<a class="nav-link" href="home.html">HOME</a>
			<a class="nav-link" href="properties.html">PROPERTIES</a>
			<a class="nav-link" href="inquiries.html">INQUIRIES</a>
			<a class="nav-link" href="appointment.html">BOOK AN APPOINTMENT</a>
			<a class="nav-link" href="about.html">ABOUT ME</a>
			<button id="wishlistBtn" class="nav-wishlist-btn" title="View Wishlist"><img src="../images/heart-full.png" alt="Wishlist" /></button>
		</nav>
	</header>

	<div class="page-wrap">
		<aside class="sidebar">
			<div class="logo">
				<img src="../images/logo1.jpg" alt="Agent logo" />
			</div>
		</aside>

		<main class="content">
			<div class="account-container" id="accountContent">
				<!-- Content will be populated by JavaScript -->
			</div>
		</main>
	</div>

	<script>
		function renderLoggedInAccount() {
			const currentUser = JSON.parse(localStorage.getItem('currentUser'));
			const newAccount = JSON.parse(localStorage.getItem('newAccount'));
			const user = currentUser || newAccount;
			
			const fullname = user.fullname || user.email.split('@')[0];
			const avatarInitial = fullname.charAt(0).toUpperCase();
			
			const html = `
				<h2>My Account</h2>
				
				<div class="user-avatar">
					<div class="avatar-circle">${avatarInitial}</div>
				</div>
				
				<div class="user-info">
					<div class="info-item">
						<div class="info-label">Username</div>
						<div class="info-value">${fullname}</div>
					</div>
					
					<div class="info-item">
						<div class="info-label">Email Address</div>
						<div class="info-value">${user.email}</div>
					</div>
					
					${user.phone ? `
					<div class="info-item">
						<div class="info-label">Phone Number</div>
						<div class="info-value">${user.phone}</div>
					</div>
					` : ''}
					
					<div class="info-item">
						<div class="info-label">Member Since</div>
						<div class="info-value">${new Date(user.registeredDate || user.loginTime).toLocaleDateString()}</div>
					</div>
				</div>
				
				<div class="account-settings">
					<h3>Preferences</h3>
					<div class="settings-option">
						<label>Email Notifications</label>
						<div class="toggle-switch">
							<input type="checkbox" id="emailNotif" checked>
						</div>
					</div>
					<div class="settings-option">
						<label>Property Alerts</label>
						<div class="toggle-switch">
							<input type="checkbox" id="propertyAlerts" checked>
						</div>
					</div>
					<div class="settings-option">
						<label>Newsletter Subscription</label>
						<div class="toggle-switch">
							<input type="checkbox" id="newsletter">
						</div>
					</div>
				</div>
				
				<div class="action-buttons">
					<button class="btn btn-primary" onclick="editProfile()">Edit Profile</button>
					<button class="btn btn-primary" onclick="changePassword()">Change Password</button>
					<button class="btn btn-logout" onclick="logout()">Logout</button>
					<button class="btn btn-back" onclick="goHome()">Back to Home</button>
				</div>
			`;
			
			document.getElementById('accountContent').innerHTML = html;
		}

		function renderNotLoggedIn() {
			const html = `
				<div class="not-logged-in">
					<h2 style="margin-bottom: 20px; color: var(--text);">You're Not Logged In</h2>
					<p>Please log in or create an account to access your profile.</p>
					<div class="login-register-links">
						<a href="login.html">Sign In</a>
						<a href="register.html">Create Account</a>
					</div>
				</div>
			`;
			
			document.getElementById('accountContent').innerHTML = html;
		}

		function logout() {
			localStorage.removeItem('currentUser');
			alert('You have been logged out successfully.');
			window.location.href = 'home.html';
		}

		function editProfile() {
			alert('Edit Profile feature would open here. (Simulated)');
		}

		function changePassword() {
			alert('Change Password dialog would open here. (Simulated)');
		}

		function goHome() {
			window.location.href = 'home.html';
		}

		document.addEventListener('DOMContentLoaded', function(){
			const currentUser = localStorage.getItem('currentUser');
			
			if (currentUser) {
				renderLoggedInAccount();
			} else {
				renderNotLoggedIn();
			}
			
			const wishlistBtn = document.getElementById('wishlistBtn');
			if(wishlistBtn) {
				wishlistBtn.onclick = function(e) {
					e.preventDefault();
					window.location.href = 'properties.html';
				};
			}

			// Initialize account button
			const container = document.getElementById('accountBtnContainer');
			if (container) {
				if (currentUser) {
					const user = JSON.parse(currentUser);
					const username = user.username || user.email.split('@')[0];
					const initial = username.charAt(0).toUpperCase();
					
					container.innerHTML = `
						<a href="account.html" class="nav-account-btn">
							<span class="nav-account-avatar">${initial}</span>
							<span>${username}</span>
						</a>
					`;
				} else {
					container.innerHTML = `<a href="login.html" class="nav-account-btn">Login</a>`;
				}
			}
		});
	</script>
</body>
</html>
