<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login || Real Estate Broker</title>
	<link rel="stylesheet" href="../css/styles.css">
	<style>
		.login-container {
			display: grid;
			grid-template-columns: 1fr;
			gap: 30px;
			max-width: 400px;
			margin: 40px auto;
			padding: 30px;
			background: var(--accent);
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0,0,0,.15);
		}

		.login-container h2 {
			color: var(--text);
			text-align: center;
			margin: 0 0 20px 0;
			font-size: 28px;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			margin-bottom: 18px;
		}

		.form-group label {
			font-weight: 700;
			color: var(--text);
			margin-bottom: 8px;
			font-size: 14px;
		}

		.form-group input {
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-family: Arial, sans-serif;
			font-size: 14px;
			box-sizing: border-box;
		}

		.form-group input:focus {
			outline: none;
			border-color: var(--green);
			box-shadow: 0 0 0 3px rgba(91, 140, 86, 0.1);
		}

		.remember-me {
			display: flex;
			align-items: center;
			margin-bottom: 18px;
			gap: 8px;
		}

		.remember-me input[type="checkbox"] {
			width: 18px;
			height: 18px;
			cursor: pointer;
		}

		.remember-me label {
			margin: 0;
			cursor: pointer;
			font-size: 13px;
		}

		.login-btn {
			background: var(--green);
			color: #fff;
			padding: 14px 24px;
			border-radius: 4px;
			border: none;
			font-weight: 700;
			cursor: pointer;
			font-size: 16px;
			transition: background 0.3s;
		}

		.login-btn:hover {
			background: #4a6d45;
		}

		.register-link {
			text-align: center;
			color: var(--text);
			font-size: 14px;
		}

		.register-link a {
			color: var(--green);
			text-decoration: none;
			font-weight: 700;
		}

		.register-link a:hover {
			text-decoration: underline;
		}

		.success-message {
			display: none;
			background: #d4edda;
			color: #155724;
			padding: 12px;
			border-radius: 4px;
			margin-bottom: 18px;
			text-align: center;
			font-weight: 600;
		}

		@media (max-width: 600px) {
			.login-container {
				max-width: 100%;
				margin: 20px;
				padding: 20px;
			}

			.login-container h2 {
				font-size: 22px;
			}
		}
	</style>
</head>
<body>
	<header class="site-header">
		<nav class="nav">
			<a class="nav-link" href="home.html">HOME</a>
			<a class="nav-link" href="properties.html">PROPERTIES</a>
			<a class="nav-link" href="inquiries.html">INQUIRIES</a>
			<a class="nav-link" href="appointment.html">BOOK AN APPOINTMENT</a>
			<a class="nav-link" href="about.html">ABOUT ME</a>
			<button id="wishlistBtn" class="nav-wishlist-btn" title="View Wishlist"><img src="../images/heart-full.png" alt="Wishlist" /></button>
		</nav>
	</header>

	<div class="page-wrap">
		<aside class="sidebar">
			<div class="logo">
				<img src="../images/logo1.jpg" alt="Agent logo" />
			</div>
		</aside>

		<main class="content">
			<div class="login-container">
				<div id="successMessage" class="success-message">Account login successful!</div>
				
				<h2>Login</h2>

				<form id="loginForm" onsubmit="handleLogin(event)">
					<div class="form-group">
						<label for="email">Email Address:</label>
						<input type="email" id="email" name="email" required placeholder="Enter your email">
					</div>

					<div class="form-group">
						<label for="password">Password:</label>
						<input type="password" id="password" name="password" required placeholder="Enter your password">
					</div>

					<div class="remember-me">
						<input type="checkbox" id="rememberMe" name="rememberMe">
						<label for="rememberMe">Remember me</label>
					</div>

					<button type="submit" class="login-btn">Sign In →</button>
				</form>

				<div class="register-link">
					Don't have an account? <a href="register.html">Create one here</a>
				</div>
			</div>
		</main>
	</div>

	<script>
		function handleLogin(event) {
			event.preventDefault();
			
			const email = document.getElementById('email').value;
			const rememberMe = document.getElementById('rememberMe').checked;
			
			// Simulate user login
			const userData = {
				email: email,
				username: email.split('@')[0],
				loginTime: new Date().toISOString(),
				rememberMe: rememberMe
			};
			
			localStorage.setItem('currentUser', JSON.stringify(userData));
			
			// Show success message
			document.getElementById('successMessage').style.display = 'block';
			
			// Redirect after 2 seconds
			setTimeout(() => {
				window.location.href = 'home.html';
			}, 2000);
		}

		document.addEventListener('DOMContentLoaded', function(){
			const wishlistBtn = document.getElementById('wishlistBtn');
			if(wishlistBtn) {
				wishlistBtn.onclick = function(e) {
					e.preventDefault();
					window.location.href = 'properties.html';
				};
			}

			// Initialize account button
			const container = document.getElementById('accountBtnContainer');
			if (container) {
				const currentUser = localStorage.getItem('currentUser');
				
				if (currentUser) {
					const user = JSON.parse(currentUser);
					const username = user.username || user.email.split('@')[0];
					const initial = username.charAt(0).toUpperCase();
					
					container.innerHTML = `
						<a href="account.html" class="nav-account-btn">
							<span class="nav-account-avatar">${initial}</span>
							<span>${username}</span>
						</a>
					`;
				} else {
					container.innerHTML = `<a href="login.html" class="nav-account-btn">Login</a>`;
				}
			}
		});
	</script>
</body>
</html>
